# =============================================================================
# Mindspace — Text Sentiment API (LightGBM, port 9000)
# =============================================================================
# Usage:
#   docker compose up --build     # build and start
#   docker compose down           # stop and remove container
#
# Requires a .env file in this folder with: MINDSPACE_TEXT_API_KEY=<your-key>
# =============================================================================

services:
  text-api:
    build: .
    container_name: mindspace-text-api
    ports:
      - "9000:9000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
